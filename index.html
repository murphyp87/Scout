<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scout" />
  <meta name="theme-color" content="#0a1326" />
  <title>Wrestling Scout</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    /* ===== Theme palette: Navy / Gray / White ===== */
    :root, [data-theme="dark"] {           /* DARK — navy dominant */
      --bg: #0a1326;
      --card: #14213f;
      --card-2: #0f1a33;
      --card-grad: #0e1830;
      --empty-bg: #0b1428;
      --card-edge: #28385c;
      --text: #eef2f8;
      --muted: #9fb0cc;
      --accent: #3f74e0;                    /* vivid blue that pops on navy */
      --accent-2: #2c54ad;                  /* darker end of the header gradient */
      --on-accent: #ffffff;
      --hl-bg: rgba(63,116,224,.12);
      --hl-edge: rgba(63,116,224,.40);
      --hl-text: #8fb2ff;
      --bar-bg: rgba(10,19,38,.85);
      --nav-bg: rgba(20,32,60,.92);
      --shadow: 0 10px 28px rgba(0,0,0,.45);
      --brand-shadow: 0 6px 16px rgba(63,116,224,.32);
      --good: #5fd38a; --warn: #f2c14e; --bad: #ef6a52;
      --err-bg: #2a1414; --err-edge: #5a2a2a; --err-text: #ffd9d2;
      --card-w: 300px;
    }
    [data-theme="light"] {                  /* LIGHT — white dominant */
      --bg: #eef1f7;
      --card: #ffffff;
      --card-2: #f3f6fb;
      --card-grad: #fbfcfe;
      --empty-bg: #eef1f7;
      --card-edge: #d3dbe8;
      --text: #15233f;                      /* navy text */
      --muted: #5d6b85;
      --accent: #1f3f7a;                     /* navy accent */
      --accent-2: #15305f;                   /* darker end of the header gradient */
      --on-accent: #ffffff;
      --hl-bg: rgba(31,63,122,.07);
      --hl-edge: rgba(31,63,122,.25);
      --hl-text: #1f3f7a;
      --bar-bg: rgba(244,246,250,.90);
      --nav-bg: rgba(255,255,255,.95);
      --shadow: 0 6px 20px rgba(20,40,80,.12);
      --brand-shadow: 0 6px 16px rgba(31,63,122,.22);
      --good: #1f9d57; --warn: #b07d09; --bad: #c33a26;
      --err-bg: #fbeaea; --err-edge: #e3b3b3; --err-text: #8a2020;
      --card-w: 300px;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 0 0 env(safe-area-inset-bottom, 24px);
      transition: background .2s ease, color .2s ease;
    }
    .pad { padding-left: 16px; padding-right: 16px; }
    .wrap { width: 100%; max-width: 1400px; margin: 0 auto; }

    /* contrasting header banner — sticky so it stays put while the page scrolls */
    header.page {
      position: sticky; top: 0; z-index: 20; margin: 0 0 12px;
      padding: calc(14px + env(safe-area-inset-top, 0px)) 18px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: var(--on-accent); border-radius: 0 0 12px 12px; box-shadow: var(--shadow);
    }
    header.page .kicker {
      font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.78); font-weight: 700;
    }
    header.page h1 { font-size: 26px; font-weight: 800; margin: 2px 0 2px; letter-spacing: -.01em; color: #fff; }
    header.page .meta { color: rgba(255,255,255,.85); font-size: 13px; }
    /* hamburger menu button — respects iOS safe-area-inset-top for Home Screen apps */
    .menu-btn {
      position: absolute; top: calc(10px + env(safe-area-inset-top, 0px)); right: 16px;
      width: 40px; height: 40px; border-radius: 999px; cursor: pointer;
      background: rgba(255,255,255,.16); color: #fff; border: 1px solid rgba(255,255,255,.38);
      font-size: 20px; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    @media (hover: hover) { .menu-btn:hover { background: rgba(255,255,255,.26); } }
    .menu-btn:active { transform: scale(.94); }

    /* settings dropdown panel */
    .settings-panel {
      position: fixed; top: var(--header-h, 64px); right: 12px; z-index: 25;
      background: var(--card); color: var(--text);
      border: 1px solid var(--card-edge); border-radius: 10px; box-shadow: var(--shadow);
      padding: 6px 0; min-width: 210px;
    }
    .settings-panel[hidden] { display: none; }
    .setting-row {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 10px 16px; font-size: 14px; font-weight: 600;
    }
    .setting-row .theme-toggle {
      flex: none; width: 36px; height: 36px; border-radius: 999px; cursor: pointer;
      background: var(--card-2); color: var(--text); border: 1px solid var(--card-edge);
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .setting-row .theme-toggle:active { transform: scale(.94); }

    /* ---- one horizontal row per weight class ---- */
    .weight-row { margin-top: 22px; }
    .row-head {
      display: flex; align-items: baseline; gap: 10px; margin: 0 0 10px;
    }
    .row-weight { font-size: 18px; font-weight: 800; }
    .row-weight .unit { color: var(--muted); font-size: 13px; font-weight: 600; }
    .row-count { color: var(--muted); font-size: 12px; }

    .row-scroller { position: relative; }
    .track {
      display: flex; gap: 14px; overflow-x: auto; scroll-behavior: smooth;
      scroll-snap-type: x mandatory; padding: 2px 16px 10px;
      scrollbar-width: thin; scrollbar-color: var(--card-edge) transparent;
    }
    .track::-webkit-scrollbar { height: 8px; }
    .track::-webkit-scrollbar-thumb { background: var(--card-edge); border-radius: 8px; }
    .track:focus { outline: none; }
    .track:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 16px; }

    /* desktop scroll arrows — hidden on touch / when a row doesn't overflow */
    .nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 38px; height: 38px; border-radius: 999px; z-index: 2;
      background: var(--nav-bg); border: 1px solid var(--card-edge);
      color: var(--text); font-size: 20px; line-height: 1; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }
    .nav:hover { border-color: var(--accent); }
    .nav.prev { left: 2px; } .nav.next { right: 2px; }
    .nav[disabled] { opacity: .3; cursor: default; }
    @media (hover: hover) and (pointer: fine) {
      .row-scroller.overflowing .nav { display: flex; }
    }

    a.card {
      display: block; text-decoration: none; color: inherit;
      background: linear-gradient(180deg, var(--card), var(--card-grad));
      border: 1px solid var(--card-edge);
      border-radius: 10px;
      padding: 18px;
      box-shadow: var(--shadow);
      transition: transform .08s ease, border-color .15s ease;
    }
    /* fixed width only inside a horizontal weight scroller; elsewhere cards fill their column */
    .track > a.card { flex: 0 0 var(--card-w); width: var(--card-w); scroll-snap-align: start; }
    a.card:active { transform: scale(.985); border-color: var(--accent); }
    @media (hover: hover) { a.card:hover { border-color: var(--accent); } }

    .top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
    .name { font-size: 20px; font-weight: 800; letter-spacing: -.01em; }
    .matches-badge {
      flex: none; background: var(--accent); color: var(--on-accent); font-weight: 800;
      padding: 5px 10px; border-radius: 999px; font-size: 12px; white-space: nowrap;
    }
    .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

    .records { display: flex; gap: 10px; margin: 16px 0 6px; }
    .stat {
      flex: 1; background: var(--card-2); border: 1px solid var(--card-edge);
      border-radius: 8px; padding: 10px; text-align: center;
    }
    .stat .label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    .stat .value { font-size: 20px; font-weight: 800; margin-top: 3px; }

    .section-label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 14px 0 7px; }
    .weights { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      background: var(--card-2); border: 1px solid var(--card-edge); border-radius: 6px;
      padding: 6px 10px; font-size: 13px;
    }
    .chip b { color: var(--hl-text); }

    .njsiaa {
      margin-top: 14px; padding: 11px 13px; border-radius: 8px;
      background: var(--hl-bg); border: 1px solid var(--hl-edge);
    }
    .njsiaa .label { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--hl-text); margin-bottom: 5px; }
    .nj-row { display: flex; gap: 8px; align-items: baseline; font-size: 13px; margin-top: 4px; }
    .nj-yr { flex: none; width: 48px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .nj-res { font-weight: 700; }

    /* ---- landing: list of schools ---- */
    .search {
      width: 100%; max-width: 560px; margin-top: 16px;
      background: var(--card); color: var(--text);
      border: 1px solid var(--card-edge); border-radius: 8px;
      padding: 12px 14px; font: inherit; font-size: 16px; /* 16px avoids iOS zoom-on-focus */
    }
    .search:focus { outline: none; border-color: var(--accent); }
    .search::placeholder { color: var(--muted); }
    .team-list { display: grid; gap: 12px; margin-top: 14px; max-width: 560px; }
    .team-item {
      display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit;
      background: linear-gradient(180deg, var(--card), var(--card-grad));
      border: 1px solid var(--card-edge); border-radius: 10px; padding: 18px 20px;
      box-shadow: var(--shadow);
      transition: transform .08s ease, border-color .15s ease;
    }
    .team-item:active { transform: scale(.99); }
    .team-item:active, .team-item:focus-visible { border-color: var(--accent); }
    @media (hover: hover) { .team-item:hover { border-color: var(--accent); } }
    .team-info { flex: 1; min-width: 0; }
    .team-name { font-size: 20px; font-weight: 800; letter-spacing: -.01em; }
    .team-sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .team-go { color: var(--muted); font-size: 26px; line-height: 1; }

    /* ---- sticky team-view control bar: back + team switcher ---- */
    .team-bar {
      position: sticky; top: var(--header-h, 0px); z-index: 5;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; margin-bottom: 4px;
      background: var(--bar-bg); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--card-edge);
    }
    .back, .team-switch {
      border-radius: 6px; padding: 9px 13px;
      font: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .team-switch {
      margin-left: auto; max-width: 55%;
      background: var(--card); color: var(--text); border: 1px solid var(--card-edge);
    }
    /* prominent, accent-filled back button */
    .back {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: var(--on-accent); border: 1px solid var(--accent);
      font-weight: 800; box-shadow: var(--brand-shadow);
    }
    .back:active { transform: scale(.98); }
    @media (hover: hover) {
      .back:hover { filter: brightness(1.08); }
      .team-switch:hover { border-color: var(--accent); }
    }

    /* ---- home menu (3 choices) ---- */
    .home-menu { display: grid; gap: 14px; margin-top: 20px; max-width: 560px; }
    .home-choice {
      display: flex; align-items: center; gap: 16px; text-decoration: none; color: inherit;
      background: linear-gradient(180deg, var(--card), var(--card-grad));
      border: 1px solid var(--card-edge); border-radius: 10px; padding: 20px;
      box-shadow: var(--shadow); transition: transform .08s ease, border-color .15s ease;
    }
    .home-choice:active { transform: scale(.99); }
    @media (hover: hover) { .home-choice:hover { border-color: var(--accent); } }
    .home-choice .ico { font-size: 30px; flex: none; width: 40px; text-align: center; }
    .home-choice .h-title { font-size: 19px; font-weight: 800; }
    .home-choice .h-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .home-choice .team-go { margin-left: auto; color: var(--muted); font-size: 26px; }

    /* ---- top nav bar (back / home on sub-pages) ---- */
    .navbar {
      position: sticky; top: var(--header-h, 0px); z-index: 5; display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; margin-bottom: 4px;
      background: var(--bar-bg); backdrop-filter: blur(8px); border-bottom: 1px solid var(--card-edge);
    }

    /* ---- matchup selectors ---- */
    .mu-form { max-width: 620px; margin: 16px auto 0; display: grid; gap: 16px; }
    .mu-group { background: var(--card-2); border: 1px solid var(--card-edge); border-radius: 10px; padding: 14px 16px; }
    .mu-group h3 { margin: 0 0 10px; font-size: 13px; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); }
    .mu-field { margin-top: 10px; }
    .mu-field:first-of-type { margin-top: 0; }
    .mu-field label { display: block; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .mu-field select {
      width: 100%; background: var(--card); color: var(--text); border: 1px solid var(--card-edge);
      border-radius: 6px; padding: 11px 12px; font: inherit; font-size: 16px; /* 16px avoids iOS zoom */
    }
    .mu-field select:disabled { opacity: .5; }
    .mu-field select:focus { outline: none; border-color: var(--accent); }
    .btn-primary {
      width: 100%; background: var(--accent); color: var(--on-accent); border: none; border-radius: 8px;
      padding: 14px; font: inherit; font-size: 16px; font-weight: 800; cursor: pointer;
      box-shadow: var(--brand-shadow);
    }
    .btn-primary:disabled { opacity: .45; cursor: default; box-shadow: none; }
    .btn-primary:active:not(:disabled) { transform: scale(.99); }

    /* ---- team matchup results ---- */
    .mu-results { margin-top: 18px; }
    .mu-teamhead {
      position: sticky; top: calc(var(--header-h, 0px) + 56px); z-index: 4; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      padding: 8px 16px; background: var(--bar-bg); backdrop-filter: blur(8px);
    }
    .mu-teamhead .th { text-align: center; font-weight: 800; font-size: 14px; padding: 6px; border-radius: 6px; background: var(--card-2); border: 1px solid var(--card-edge); }
    .mu-weight { margin-top: 14px; }
    .mu-weight-label { text-align: center; font-size: 13px; font-weight: 800; color: var(--hl-text); margin-bottom: 8px; }
    .mu-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: start; padding: 0 12px; }
    .mu-empty {
      border: 1px dashed var(--card-edge); border-radius: 10px; padding: 24px 10px; text-align: center;
      color: var(--muted); font-size: 13px; background: var(--empty-bg);
    }

    /* compact, skinny cards for the side-by-side team matchup */
    .mu-pair .card { padding: 13px; border-radius: 10px; min-width: 0; overflow-wrap: anywhere; }
    .mu-pair .top { flex-direction: column; align-items: flex-start; gap: 6px; }
    .mu-pair .name { font-size: 16px; }
    .mu-pair .matches-badge { font-size: 10px; padding: 3px 8px; }
    .mu-pair .records { flex-direction: column; gap: 8px; margin: 12px 0 4px; }   /* This Year / Last Year stacked */
    .mu-pair .stat { display: flex; align-items: baseline; justify-content: space-between; text-align: left; padding: 8px 10px; }
    .mu-pair .stat .value { font-size: 16px; }
    .mu-pair .weights { flex-direction: column; gap: 6px; }                        /* weight records stacked */
    .mu-pair .chip { font-size: 12px; }
    .mu-pair .njsiaa { padding: 10px 11px; }
    .mu-pair .nj-row { flex-direction: column; gap: 1px; margin-top: 7px; }        /* "This yr"/"Last yr" as headers */
    .mu-pair .nj-row:first-of-type { margin-top: 0; }
    .mu-pair .nj-yr { width: auto; }
    .mu-pair .nj-res { font-size: 12px; line-height: 1.3; }

    /* ---- individual matchup results ---- */
    .mu-mine { max-width: 560px; margin: 16px auto 0; padding: 0 16px; }
    .mu-mine .lead { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .opp-list { max-width: 560px; margin: 22px auto 0; padding: 0 16px; display: grid; gap: 14px; }
    .opp-head { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
    /* unified wrapper: wrestler card on top, score strip below */
    .opp { border: 1px solid var(--card-edge); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); }
    .opp > a.card { border: none; border-radius: 0; box-shadow: none; border-bottom: 1px solid var(--card-edge); }
    .opp-scores { background: var(--card-2); margin: 0; padding: 10px 12px; }
    .scores { display: flex; gap: 8px; }
    .score { flex: 1; text-align: center; border-radius: 6px; padding: 8px 6px; border: 1px solid var(--card-edge); background: var(--card-2); }
    .score .s-lbl { font-size: 9px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); }
    .score .s-val { font-size: 19px; font-weight: 800; margin-top: 2px; }
    /* value-based score colors: >50% green, 35–50% yellow, <35% red */
    .s-val.sc-green { color: var(--good); }
    .s-val.sc-yellow { color: var(--warn); }
    .s-val.sc-red { color: var(--bad); }
    .disclaimer { max-width: 560px; margin: 18px auto 0; padding: 0 16px; color: var(--muted); font-size: 11px; font-style: italic; }

    /* ---- feedback (Comment) button + modal ---- */
    .fab {
      position: fixed; right: 16px; bottom: 16px; z-index: 20;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent); color: var(--on-accent); border: none;
      border-radius: 50%; width: 48px; height: 48px; font-size: 22px;
      box-shadow: var(--brand-shadow); cursor: pointer;
    }
    .fab:active { transform: scale(.96); }
    /* ☕ + 💬 side-by-side row, bottom-right */
    .fab-row { position: fixed; bottom: 16px; right: 16px; z-index: 20; display: flex; gap: 10px; align-items: center; }
    .fab-row .fab { position: static; }
    /* Back/Home FAB — bottom-left, hidden on home page */
    .fab-back { left: 16px; right: auto; font-size: 18px; font-weight: 800; width: auto; padding: 0 16px; border-radius: 24px; gap: 4px; }
    .fab-back[hidden] { display: none; }
    .modal[hidden] { display: none; }
    .modal {
      position: fixed; inset: 0; z-index: 40; display: flex; align-items: flex-end; justify-content: center;
      background: rgba(0,0,0,.55);
    }
    @media (min-width: 560px) { .modal { align-items: center; } }
    .modal-card {
      width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto;
      background: var(--card); color: var(--text);
      border: 1px solid var(--card-edge); border-radius: 10px 10px 0 0; padding: 20px 18px 22px;
      box-shadow: var(--shadow);
    }
    @media (min-width: 560px) { .modal-card { border-radius: 10px; } }
    .modal-card h2 { margin: 0 0 4px; font-size: 19px; }
    .modal-card .hint { margin: 0; color: var(--muted); font-size: 13px; }
    .modal-card label { display: block; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); margin: 14px 0 5px; }
    .modal-card input, .modal-card textarea {
      width: 100%; background: var(--card-2); color: var(--text); border: 1px solid var(--card-edge);
      border-radius: 10px; padding: 11px 12px; font: inherit; font-size: 16px;
    }
    .modal-card input:focus, .modal-card textarea:focus { outline: none; border-color: var(--accent); }
    .modal-card textarea { min-height: 110px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions .btn-primary { flex: 1; width: auto; }
    .btn-ghost {
      flex: none; background: var(--card-2); color: var(--text); border: 1px solid var(--card-edge);
      border-radius: 8px; padding: 14px 18px; font: inherit; font-weight: 700; cursor: pointer;
    }
    .form-status { margin-top: 12px; font-size: 13px; min-height: 18px; }
    .form-status.ok { color: var(--good); }
    .form-status.err { color: var(--bad); }
    .hp { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }

    .footer { text-align: center; color: var(--muted); font-size: 11px; margin-top: 26px; }
    .app-version { text-align: center; color: var(--muted); font-size: 10px; opacity: .65; padding: 18px 0 6px; }
    .error { background: var(--err-bg); border: 1px solid var(--err-edge); color: var(--err-text); padding: 16px; border-radius: 14px; }
    code { background: var(--card-2); padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="page pad">
      <button id="menu-btn" class="menu-btn" type="button" aria-label="Open settings" aria-haspopup="true" aria-expanded="false">☰</button>
      <div class="kicker">Wrestling Scout</div>
      <h1 id="title">Loading…</h1>
      <div class="meta" id="meta"></div>
    </header>
    <div id="root"></div>
    <footer id="app-version" class="app-version"></footer>
  </div>

  <div id="settings-panel" class="settings-panel" hidden role="menu" aria-label="Settings">
    <div class="setting-row">
      <span>Appearance</span>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark / light mode"></button>
    </div>
  </div>

  <a id="back-fab" class="fab fab-back" href="#" hidden>‹ Home</a>
  <div class="fab-row">
    <a href="https://www.buymeacoffee.com/Apauled" target="_blank" rel="noopener noreferrer" class="fab" aria-label="Buy me a coffee">☕</a>
    <button id="comment-btn" class="fab" type="button" aria-haspopup="dialog" aria-label="Send feedback">💬</button>
  </div>
  <div id="comment-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="cf-title" hidden>
    <form id="comment-form" class="modal-card" novalidate>
      <h2 id="cf-title">Send Feedback</h2>
      <p class="hint">Found a bug or have a suggestion? It goes straight to the maintainer.</p>
      <input type="text" name="botcheck" class="hp" tabindex="-1" autocomplete="off" aria-hidden="true" />
      <label for="cf-name">Name (optional)</label>
      <input id="cf-name" name="name" type="text" autocomplete="name" />
      <label for="cf-email">Your email (optional — for a reply)</label>
      <input id="cf-email" name="email" type="email" autocomplete="email" inputmode="email" />
      <label for="cf-message">Comment</label>
      <textarea id="cf-message" name="message" required placeholder="Your feedback…"></textarea>
      <div id="cf-status" class="form-status" role="status"></div>
      <div class="modal-actions">
        <button type="button" class="btn-ghost" id="cf-cancel">Cancel</button>
        <button type="submit" class="btn-primary" id="cf-send">Send</button>
      </div>
    </form>
  </div>

  <script>
    const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

    function card(p) {
      const chips = (p.byWeight || [])
        .map((w) => `<span class="chip">${esc(w.weight)}: <b>${esc(w.record)}</b></span>`)
        .join('');

      const lastYear = `<div class="stat"><div class="label">Last Year</div><div class="value">${esc(p.lastYearOverall || '—')}</div></div>`;

      const njRow = (label, val) =>
        `<div class="nj-row"><span class="nj-yr">${esc(label)}</span><span class="nj-res">${esc(val)}</span></div>`;
      const njParts = [];
      if (p.thisYearNJSIAA) njParts.push(njRow('This yr', p.thisYearNJSIAA));
      if (p.lastYearNJSIAA) njParts.push(njRow('Last yr', p.lastYearNJSIAA));
      const njsiaa = njParts.length
        ? `<div class="njsiaa"><div class="label">Furthest NJSIAA</div>${njParts.join('')}</div>`
        : '';

      return `
        <a class="card" href="${esc(p.profileUrl)}" target="_blank" rel="noopener noreferrer">
          <div class="top">
            <div>
              <div class="name">${esc(p.name)}</div>
              <div class="sub">${esc(p.class || '')}</div>
            </div>
            <div class="matches-badge">${esc(p.matchesThisYear)} match${p.matchesThisYear === 1 ? '' : 'es'}</div>
          </div>
          <div class="records">
            <div class="stat"><div class="label">This Year</div><div class="value">${esc(p.overall)}</div></div>
            ${lastYear}
          </div>
          <div class="section-label">Record by Weight</div>
          <div class="weights">${chips}</div>
          ${njsiaa}
        </a>`;
    }

    function weightRow(weight, wrestlers) {
      const cards = wrestlers.map(card).join('');
      const n = wrestlers.length;
      return `
        <section class="weight-row">
          <div class="row-head pad">
            <div class="row-weight">${esc(weight)}<span class="unit"> lb</span></div>
            <div class="row-count">${n} wrestler${n === 1 ? '' : 's'}</div>
          </div>
          <div class="row-scroller">
            <button class="nav prev" aria-label="Scroll left">‹</button>
            <div class="track" tabindex="0">${cards}</div>
            <button class="nav next" aria-label="Scroll right">›</button>
          </div>
        </section>`;
    }

    // Wire up arrow buttons + keyboard for one scroller; show arrows only when it overflows.
    function setupScroller(scroller) {
      const track = scroller.querySelector('.track');
      const prev = scroller.querySelector('.nav.prev');
      const next = scroller.querySelector('.nav.next');
      const step = () => Math.max(track.clientWidth * 0.9, 280);

      const update = () => {
        const overflowing = track.scrollWidth - track.clientWidth > 4;
        scroller.classList.toggle('overflowing', overflowing);
        const x = track.scrollLeft;
        prev.disabled = x <= 1;
        next.disabled = x >= track.scrollWidth - track.clientWidth - 1;
      };

      prev.addEventListener('click', () => track.scrollBy({ left: -step(), behavior: 'smooth' }));
      next.addEventListener('click', () => track.scrollBy({ left: step(), behavior: 'smooth' }));
      track.addEventListener('scroll', update, { passive: true });
      track.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight') { e.preventDefault(); track.scrollBy({ left: step(), behavior: 'smooth' }); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); track.scrollBy({ left: -step(), behavior: 'smooth' }); }
      });
      window.addEventListener('resize', update);
      update();
    }

    const root = document.getElementById('root');
    const titleEl = document.getElementById('title');
    const metaEl = document.getElementById('meta');

    // ===== shared data + helpers =====
    let teamsIndex = null;
    const teamCache = {};
    const DEFAULT_TEAM = 'middletown-middletown-south'; // pre-selected in the matchup pickers

    // Deployed app version — BUMP THIS on every code deploy so the footer tracks what's live.
    const APP_VERSION = 'v1.3.7 (2026-06-29)';

    async function loadJSON(url) {
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status + ' for ' + url);
      return r.json();
    }
    async function loadTeam(id) {
      if (!teamCache[id]) teamCache[id] = await loadJSON(`data/${id}.json`);
      return teamCache[id];
    }
    const teamOptions = (selected) =>
      teamsIndex.teams
        .map((t) => `<option value="${esc(t.id)}"${t.id === selected ? ' selected' : ''}>${esc(t.name)}</option>`)
        .join('');
    const backFabEl = document.getElementById('back-fab');
    function setBackFab(href, label) {
      if (href) { backFabEl.href = href; backFabEl.textContent = label || '‹ Home'; backFabEl.removeAttribute('hidden'); }
      else { backFabEl.setAttribute('hidden', ''); }
    }
    const navbar = () => '';

    // Standard NJ weight ladder, used for class distance + bump-one-class logic.
    const WEIGHTS = [106, 113, 120, 126, 132, 138, 144, 150, 157, 165, 175, 190, 215, 285];
    function classIndex(w) {
      const i = WEIGHTS.indexOf(Number(w));
      if (i >= 0) return i;
      let best = 0, bd = Infinity;
      WEIGHTS.forEach((ww, k) => { const d = Math.abs(ww - w); if (d < bd) { bd = d; best = k; } });
      return best;
    }
    const recOf = (p) => {
      const m = /(\d+)\s*-\s*(\d+)/.exec(p.overall || '');
      const wins = m ? +m[1] : 0, losses = m ? +m[2] : 0;
      return { wins, losses, matches: wins + losses };
    };
    const pct = (x) => Math.round(x * 100) + '%';

    // --- scoring (see README for the formulas) ---
    const SHRINK = 5, BETA = 0.4;
    function rating(p) {
      const r = recOf(p);
      const adj = (r.wins + SHRINK / 2) / (r.matches + SHRINK); // win rate shrunk toward 50%
      return Math.log(adj / (1 - adj));                          // log-odds
    }
    function winProbability(mine, opp, myWeight) {
      const dClass = classIndex(opp.primaryWeight) - classIndex(myWeight); // + if opponent heavier
      const logit = rating(mine) - rating(opp) - BETA * dClass;
      return 1 / (1 + Math.exp(-logit));
    }
    function matchupWeight(opp, myWeight) {
      const d = Math.abs(classIndex(opp.primaryWeight) - classIndex(myWeight));
      const wf = d === 0 ? 1.0 : d === 1 ? 0.4 : 0; // same class vs one up/down; beyond ±1 excluded
      return wf * opp.matchesThisYear;
    }

    // The "main" wrestler at each weight = the most-active one at that primary weight.
    function mainByWeight(team) {
      const m = new Map();
      for (const w of team.wrestlers) {
        const c = m.get(w.primaryWeight);
        if (!c || w.matchesThisYear > c.matchesThisYear ||
            (w.matchesThisYear === c.matchesThisYear && w.name.localeCompare(c.name) < 0)) {
          m.set(w.primaryWeight, w);
        }
      }
      return m;
    }

    // ===== Home =====
    function showHome() {
      setBackFab(null);
      titleEl.textContent = 'Wrestling Scout';
      metaEl.textContent = 'Scout NJ high school wrestling';
      const choice = (route, ico, title, sub) =>
        `<a class="home-choice" href="#${route}">
           <div class="ico">${ico}</div>
           <div><div class="h-title">${title}</div><div class="h-sub">${sub}</div></div>
           <div class="team-go">›</div>
         </a>`;
      root.innerHTML =
        `<div class="home-menu pad">
           ${choice('teams', '📋', 'Teams', 'Browse every team and its wrestlers by weight')}
           ${choice('team-matchup', '⚔️', 'Team Matchup', 'Compare two teams, weight by weight')}
           ${choice('individual-matchup', '🤼', 'Individual Matchup', 'Scout your wrestler vs an opponent or school')}
         </div>`;
    }

    // ===== Teams list =====
    function showTeamList(index) {
      setBackFab('#', '‹ Home');
      const teams = index.teams || [];
      titleEl.textContent = 'Teams';
      metaEl.textContent = `Select a school to scout · ${teams.length} teams`;
      const items = teams.map((t) => `
        <a class="team-item" href="#team/${esc(t.id)}" data-name="${esc(t.name.toLowerCase())}">
          <div class="team-info">
            <div class="team-name">${esc(t.name)}</div>
            <div class="team-sub">${esc(t.season)} season · ${esc(t.wrestlers)} wrestlers</div>
          </div>
          <div class="team-go">›</div>
        </a>`).join('');
      root.innerHTML =
        navbar() +
        `<div class="pad"><input id="team-search" class="search" type="search"
            placeholder="Search ${teams.length} teams…" autocomplete="off" /></div>
         <div class="team-list pad" id="team-list">${items}</div>
         <div class="footer pad" id="no-match" style="display:none">No teams match.</div>`;

      const search = document.getElementById('team-search');
      const noMatch = document.getElementById('no-match');
      const cards = [...document.querySelectorAll('.team-item')];
      search.addEventListener('input', () => {
        const q = search.value.trim().toLowerCase();
        let shown = 0;
        for (const el of cards) {
          const hit = !q || el.dataset.name.includes(q);
          el.style.display = hit ? '' : 'none';
          if (hit) shown++;
        }
        noMatch.style.display = shown ? 'none' : '';
      });
    }

    // ===== Team view: per-weight rows =====
    function showTeam(data) {
      const list = data.wrestlers || [];
      const byWeight = new Map();
      for (const w of list) {
        if (!byWeight.has(w.primaryWeight)) byWeight.set(w.primaryWeight, []);
        byWeight.get(w.primaryWeight).push(w);
      }
      const weights = [...byWeight.keys()].sort((a, b) => a - b);
      for (const wt of weights) {
        byWeight.get(wt).sort((a, b) => (b.matchesThisYear - a.matchesThisYear) || a.name.localeCompare(b.name));
      }

      titleEl.textContent = data.team || 'Roster';
      metaEl.textContent = `${data.season} season · ${list.length} wrestlers across ${weights.length} weight classes`;

      const options = teamsIndex.teams
        .map((t) => `<option value="${esc(t.id)}"${t.id === data.id ? ' selected' : ''}>${esc(t.name)}</option>`)
        .join('');
      setBackFab('#teams', '‹ All Teams');
      const bar = `
        <div class="team-bar">
          <select class="team-switch" id="team-switch" aria-label="Switch team">${options}</select>
        </div>`;

      root.innerHTML =
        bar +
        weights.map((wt) => weightRow(wt, byWeight.get(wt))).join('') +
        `<div class="footer pad">Data parsed ${esc((data.generatedAt || '').slice(0, 10))} · swipe or use ‹ › to scroll each weight</div>`;

      document.getElementById('team-switch').addEventListener('change', (e) => { location.hash = 'team/' + e.target.value; });
      document.querySelectorAll('.row-scroller').forEach(setupScroller);
    }

    // ===== Team Matchup =====
    function showTeamMatchup(homeId, awayId) {
      setBackFab('#', '‹ Home');
      homeId = homeId || DEFAULT_TEAM; // default Home Team to Middletown South
      titleEl.textContent = 'Team Matchup';
      metaEl.textContent = 'Compare two teams weight-by-weight';
      root.innerHTML =
        navbar() +
        `<div class="mu-form">
           <div class="mu-group"><h3>Home Team</h3>
             <div class="mu-field"><label>School</label>
               <select id="tm-home"><option value="">Select a school…</option>${teamOptions(homeId)}</select></div></div>
           <div class="mu-group"><h3>Away Team</h3>
             <div class="mu-field"><label>School</label>
               <select id="tm-away"><option value="">Select a school…</option>${teamOptions(awayId)}</select></div></div>
           <button class="btn-primary" id="tm-go" disabled>Compare teams</button>
         </div>
         <div id="tm-results" class="mu-results"></div>`;

      const home = document.getElementById('tm-home');
      const away = document.getElementById('tm-away');
      const go = document.getElementById('tm-go');
      const sync = () => { go.disabled = !(home.value && away.value); };
      home.addEventListener('change', sync);
      away.addEventListener('change', sync);
      sync();
      go.addEventListener('click', () => { location.hash = `team-matchup/${home.value}/${away.value}`; });

      if (homeId && awayId) renderTeamMatchup(homeId, awayId).catch(showError);
    }

    async function renderTeamMatchup(homeId, awayId) {
      const res = document.getElementById('tm-results');
      res.innerHTML = `<div class="footer pad">Loading…</div>`;
      const [h, a] = await Promise.all([loadTeam(homeId), loadTeam(awayId)]);
      const hm = mainByWeight(h), am = mainByWeight(a);
      const weights = [...new Set([...hm.keys(), ...am.keys()])].sort((x, y) => x - y);
      const side = (p) => (p ? card(p) : `<div class="mu-empty">No wrestler<br>(forfeit)</div>`);
      res.innerHTML =
        `<div class="mu-teamhead"><div class="th">${esc(h.team)}</div><div class="th">${esc(a.team)}</div></div>` +
        weights.map((wt) => `
          <section class="mu-weight">
            <div class="mu-weight-label">${wt} lb</div>
            <div class="mu-pair">${side(hm.get(wt))}${side(am.get(wt))}</div>
          </section>`).join('') +
        `<div class="footer pad">Main wrestler = most matches at that weight · tap a card for the NJ.com profile</div>`;
      window.scrollTo(0, 0);
    }

    // ===== Individual Matchup =====
    const nameOptions = (team) =>
      team.wrestlers
        .map((w, i) => ({ w, i }))
        .sort((a, b) => a.w.name.localeCompare(b.w.name))
        .map(({ w, i }) => `<option value="${i}">${esc(w.name)} — ${esc(w.primaryWeight)} lb · ${esc(w.overall)}</option>`)
        .join('');
    const weightOptions = (sel) =>
      WEIGHTS.map((w) => `<option value="${w}"${w === sel ? ' selected' : ''}>${w} lb</option>`).join('');
    const scoreColor = (prob) => {
      const v = Math.round(prob * 100);
      return v > 50 ? 'sc-green' : v >= 35 ? 'sc-yellow' : 'sc-red';
    };
    const scoreBox = (cls, label, prob) =>
      `<div class="score ${cls}"><div class="s-lbl">${label}</div><div class="s-val ${scoreColor(prob)}">${pct(prob)}</div></div>`;
    const oppCard = (p, scoresHtml) => `<div class="opp">${card(p)}<div class="scores opp-scores">${scoresHtml}</div></div>`;

    function showIndividualMatchup() {
      setBackFab('#', '‹ Home');
      titleEl.textContent = 'Individual Matchup';
      metaEl.textContent = 'Scout your wrestler against an opponent or a school';
      root.innerHTML =
        navbar() +
        `<div class="mu-form">
           <div class="mu-group"><h3>My Wrestler</h3>
             <div class="mu-field"><label>School</label>
               <select id="im-myschool"><option value="">Select…</option>${teamOptions(DEFAULT_TEAM)}</select></div>
             <div class="mu-field"><label>Name</label>
               <select id="im-myname" disabled><option value="">Select a school first</option></select></div>
             <div class="mu-field"><label>Weight</label>
               <select id="im-myweight" disabled></select></div>
           </div>
           <div class="mu-group"><h3>Opponent</h3>
             <div class="mu-field"><label>School (required)</label>
               <select id="im-oppschool"><option value="">Select…</option>${teamOptions()}</select></div>
             <div class="mu-field"><label>Name (optional)</label>
               <select id="im-oppname" disabled><option value="">Any — show likely matchups</option></select></div>
           </div>
           <button class="btn-primary" id="im-go" disabled>Find matchup</button>
         </div>
         <div id="im-results" class="mu-results"></div>`;

      const $ = (id) => document.getElementById(id);
      const mySchool = $('im-myschool'), myName = $('im-myname'), myWeight = $('im-myweight');
      const oppSchool = $('im-oppschool'), oppName = $('im-oppname'), go = $('im-go');
      let myTeam = null, oppTeam = null;
      const sync = () => { go.disabled = !(mySchool.value && myName.value !== '' && myWeight.value && oppSchool.value); };

      mySchool.addEventListener('change', async () => {
        myName.disabled = true; myWeight.disabled = true; myWeight.innerHTML = ''; sync();
        if (!mySchool.value) { myName.innerHTML = '<option value="">Select a school first</option>'; return; }
        myName.innerHTML = '<option value="">Loading…</option>';
        myTeam = await loadTeam(mySchool.value);
        myName.innerHTML = '<option value="">Select a wrestler…</option>' + nameOptions(myTeam);
        myName.disabled = false; sync();
      });
      myName.addEventListener('change', () => {
        if (myName.value === '') { myWeight.disabled = true; myWeight.innerHTML = ''; sync(); return; }
        myWeight.innerHTML = weightOptions(myTeam.wrestlers[+myName.value].primaryWeight);
        myWeight.disabled = false; sync();
      });
      myWeight.addEventListener('change', sync);
      oppSchool.addEventListener('change', async () => {
        oppName.disabled = true; sync();
        if (!oppSchool.value) { oppName.innerHTML = '<option value="">Any — show likely matchups</option>'; return; }
        oppName.innerHTML = '<option value="">Loading…</option>';
        oppTeam = await loadTeam(oppSchool.value);
        oppName.innerHTML = '<option value="">Any — show likely matchups</option>' + nameOptions(oppTeam);
        oppName.disabled = false; sync();
      });
      oppName.addEventListener('change', sync);
      go.addEventListener('click', () => {
        renderIndividualMatchup(myTeam.wrestlers[+myName.value], +myWeight.value, oppTeam, oppName.value);
      });

      // default My Wrestler's school to Middletown South and load its roster
      if (mySchool.value) mySchool.dispatchEvent(new Event('change'));
    }

    function renderIndividualMatchup(mine, myWeight, oppTeam, oppIdx) {
      const res = document.getElementById('im-results');
      let html = `<div class="mu-mine"><div class="lead">My Wrestler — ${esc(mine.name)} · scouting at ${myWeight} lb</div>${card(mine)}</div>`;

      if (oppIdx !== '' && oppIdx != null) {
        const opp = oppTeam.wrestlers[+oppIdx];
        const scores = scoreBox('win', 'Win Probability', winProbability(mine, opp, myWeight));
        html += `<div class="opp-list"><div class="opp-head">Opponent — ${esc(oppTeam.team)}</div>${oppCard(opp, scores)}</div>`;
      } else {
        const cand = oppTeam.wrestlers
          .map((o) => ({ o, raw: matchupWeight(o, myWeight) }))
          .filter((c) => c.raw > 0);
        const total = cand.reduce((s, c) => s + c.raw, 0) || 1;
        cand.sort((a, b) => b.raw - a.raw);
        const cards = cand.slice(0, 5).map((c) => {
          const scores = scoreBox('matchup', 'Matchup Prob', c.raw / total) +
                         scoreBox('win', 'Win Prob', winProbability(mine, c.o, myWeight));
          return oppCard(c.o, scores);
        }).join('');
        const body = cand.length
          ? cards
          : `<div class="mu-empty">No opponents near ${myWeight} lb (±1 class) for ${esc(oppTeam.team)}.</div>`;
        html += `<div class="opp-list"><div class="opp-head">Likely opponents from ${esc(oppTeam.team)} · ${myWeight} lb ±1 class</div>${body}</div>`;
      }

      html += `<div class="disclaimer">Matchup Probability = chance this is the opponent actually faced (weight proximity × activity).
               Win Probability = estimated chance ${esc(mine.name)} wins (record-based, with a size adjustment for weight class).
               Heuristic estimates, not guarantees.</div>`;
      res.innerHTML = html;
      window.scrollTo(0, 0);
    }

    // ===== router =====
    function parseHash() {
      const raw = decodeURIComponent(location.hash.replace(/^#/, ''));
      const parts = raw.split('/');
      return { section: parts[0] || '', args: parts.slice(1) };
    }

    // Keep the sub-page sticky bars sitting just below the sticky header banner.
    const headerEl = document.querySelector('header.page');
    function updateHeaderH() {
      document.documentElement.style.setProperty('--header-h', headerEl.offsetHeight + 'px');
    }
    window.addEventListener('resize', updateHeaderH);

    function setFooter() {
      // Prefer dataAsOf (the last time data actually changed); fall back to file-write time.
      const stamp = teamsIndex && (teamsIndex.dataAsOf || teamsIndex.generatedAt);
      const d = stamp ? new Date(stamp).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' }) : '';
      document.getElementById('app-version').textContent =
        `Scout ${APP_VERSION}` + (d ? ` · Data as of ${d}` : '');
    }

    async function route() {
      if (!teamsIndex) { teamsIndex = await loadJSON('data/teams.json'); setFooter(); }
      const { section, args } = parseHash();
      if (section === 'teams') showTeamList(teamsIndex);
      else if (section === 'team') {
        const meta = teamsIndex.teams.find((t) => t.id === args[0]);
        if (meta) showTeam(await loadTeam(args[0])); else showTeamList(teamsIndex);
      } else if (section === 'team-matchup') showTeamMatchup(args[0], args[1]);
      else if (section === 'individual-matchup') showIndividualMatchup();
      else showHome();
      window.scrollTo(0, 0);
      updateHeaderH();
    }

    function showError(err) {
      titleEl.textContent = 'Wrestling Scout';
      metaEl.textContent = '';
      root.innerHTML =
        `<div class="error pad"><b>Couldn't load data.</b><br>` +
        `Run <code>node build.js</code>, then serve this folder ` +
        `(e.g. <code>python -m http.server</code>) and open via http://, not file://.<br><br>` +
        `<small>${esc(err.message)}</small></div>`;
    }

    document.getElementById('app-version').textContent = `Scout ${APP_VERSION}`;

    // ===== dark / light theme (persisted) =====
    const THEME_KEY = 'scout-theme';
    const THEME_COLOR = { dark: '#0a1326', light: '#eef1f7' };
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      const btn = document.getElementById('theme-toggle');
      if (btn) { btn.textContent = t === 'dark' ? '☀️' : '🌙'; } // shows the mode you'd switch TO
      const mc = document.querySelector('meta[name="theme-color"]');
      if (mc) mc.setAttribute('content', THEME_COLOR[t]);
    }
    (function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      applyTheme(saved || (prefersLight ? 'light' : 'dark'));
    })();
    // hamburger open/close
    const menuBtn = document.getElementById('menu-btn');
    const settingsPanel = document.getElementById('settings-panel');
    menuBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const opening = settingsPanel.hasAttribute('hidden');
      settingsPanel.toggleAttribute('hidden');
      menuBtn.setAttribute('aria-expanded', String(opening));
    });
    document.addEventListener('click', () => {
      settingsPanel.setAttribute('hidden', '');
      menuBtn.setAttribute('aria-expanded', 'false');
    });
    settingsPanel.addEventListener('click', (e) => e.stopPropagation());

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    });

    // ===== feedback (Comment) — posts to Web3Forms; destination email stays private =====
    const FEEDBACK_KEY = '52bd0ad6-f44c-4a1e-a6f6-b675b673ae8a';
    (function setupFeedback() {
      const btn = document.getElementById('comment-btn');
      const modal = document.getElementById('comment-modal');
      const form = document.getElementById('comment-form');
      const statusEl = document.getElementById('cf-status');
      const sendBtn = document.getElementById('cf-send');
      const close = () => { modal.hidden = true; statusEl.textContent = ''; statusEl.className = 'form-status'; };
      const open = () => { modal.hidden = false; setTimeout(() => document.getElementById('cf-message').focus(), 40); };

      btn.addEventListener('click', open);
      document.getElementById('cf-cancel').addEventListener('click', close);
      modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !modal.hidden) close(); });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = document.getElementById('cf-message').value.trim();
        if (!message) { statusEl.className = 'form-status err'; statusEl.textContent = 'Please enter a comment.'; return; }

        const fd = new FormData(form);
        const email = (fd.get('email') || '').trim();
        const payload = {
          access_key: FEEDBACK_KEY,
          subject: 'Wrestling Scout — feedback',
          from_name: 'Wrestling Scout',
          name: (fd.get('name') || '').trim() || 'Anonymous',
          message,
          page: location.hash || '#home',
          app_version: APP_VERSION,
          botcheck: fd.get('botcheck') || '',
        };
        if (email) { payload.email = email; payload.replyto = email; }

        sendBtn.disabled = true;
        statusEl.className = 'form-status'; statusEl.textContent = 'Sending…';
        try {
          const r = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await r.json();
          if (!data.success) throw new Error(data.message || 'failed');
          statusEl.className = 'form-status ok'; statusEl.textContent = 'Thanks — your comment was sent!';
          form.reset(); setTimeout(close, 1300);
        } catch (err) {
          statusEl.className = 'form-status err';
          statusEl.textContent = 'Sorry, that didn’t send. Please try again later.';
        } finally {
          sendBtn.disabled = false;
        }
      });
    })();

    window.addEventListener('hashchange', () => route().catch(showError));
    route().catch(showError);
  </script>
</body>
</html>
